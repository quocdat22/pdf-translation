# ============================================================
# pdf-translator — File cấu hình mẫu
# Sao chép file này thành config.toml ở thư mục gốc của dự án
# và điền các giá trị phù hợp.
# ============================================================

[api]
# API key của nhà cung cấp LLM (DeepSeek, OpenAI, Gemini...)
# Hoặc đặt biến môi trường: PDF_TRANSLATOR_API_KEY=your-api-key
key = "sk-your-api-key"

# Base URL của API endpoint và Model LLM tương ứng.
# Dưới đây là ví dụ cấu hình cho các provider nổi bật:
#
# --- 1. DeepSeek (Mặc định) ---
# base_url = "https://api.deepseek.com"
# model = "deepseek-chat" # deepseek-v4-flash, deepseek-v4-pro
#
# --- 2. Google (Gemini qua chuẩn tương thích OpenAI) ---
# base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
# model = "gemini-3.1-flash-lite"  
# gemini-3.1-flash-lite, gemini-3.5-flash, gemini-3.1-pro-preview
# gemini-2.5-flash, gemini-2.5-flash-lite, gemini-2.5-pro
# (Lưu ý: API Key là Google AI Studio key của bạn)
#
# --- 3. OpenAI ---
# base_url = "https://api.openai.com/v1"
# model = "gpt-4o"  # gpt-4o-mini, gpt-4-turbo
#
# --- 4. Local (Ollama - Chạy local offline, key có thể điền bất kỳ chuỗi nào) ---
# base_url = "http://localhost:11434/v1"
# model = "llama3"  # qwen2.5, mistral... tùy theo model bạn đã tải
#
base_url = "https://api.deepseek.com"
model = "deepseek-chat"

[translation]
# Ngôn ngữ nguồn
source_lang = "English"

# Ngôn ngữ đích
target_lang = "Vietnamese"

# Số trang dịch song song tối đa
# Tăng lên nếu muốn nhanh hơn (chú ý rate limit của API)
concurrency = 5

[rendering]
# Font size tối thiểu khi auto-shrink (pt)
# Text có thể bị cắt nếu dịch quá dài và font đã nhỏ nhất
min_font_size = 6.0

# Đường dẫn font tùy chỉnh (để trống = dùng Noto Sans bundle)
# font_path = "/path/to/your/font.ttf"

[logging]
# Mức log: DEBUG | INFO | WARNING | ERROR
level = "INFO"

# Đường dẫn file log (để trống = chỉ log ra console)
# log_file = "/path/to/pdf-translator.log"
